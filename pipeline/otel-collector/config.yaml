# OpenTelemetry Collector Configuration
# 部署在服务器上，采集模拟器产生的日志

receivers:
  filelog:
    include:
      - /var/log/app/*.log
    operators:
      - type: json_parser
        timestamp:
          parse_from: attributes.timestamp
          layout: '%Y-%m-%dT%H:%M:%S.%sZ'
        severity:
          parse_from: attributes.level
    start_at: beginning
    storage: file_storage

processors:
  resource:
    attributes:
      - key: host.name
        value: "sim-host-01"
        action: upsert
  batch:
    timeout: 2s
    send_batch_size: 100
    send_batch_max_size: 500

extensions:
  file_storage:
    directory: /var/lib/otelcol
    fsync: true

exporters:
  otlphttp:
    endpoint: http://vector:4318
    sending_queue:
      enabled: true
      queue_size: 5000
      num_consumers: 5
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 10s
      max_elapsed_time: 60s

service:
  extensions: [file_storage]
  pipelines:
    logs:
      receivers: [filelog]
      processors: [resource, batch]
      exporters: [otlphttp]
