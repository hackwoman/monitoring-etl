sources:
  app_logs:
    type: file
    include:
      - /var/log/app/*.log
    read_from: beginning
    fingerprint:
      strategy: device_and_inode

transforms:
  parse_json:
    type: remap
    inputs:
      - app_logs
    source: |
      . = parse_json!(.message)
      .source = "file"
      .timeliness = "hot"
      .delay_seconds = 0

sinks:
  clickhouse_logs:
    type: clickhouse
    inputs:
      - parse_json
    endpoint: http://clickhouse:8123
    database: logs
    table: log_entries
    skip_unknown_fields: true
    buffer:
      type: memory
      max_events: 10000

api:
  enabled: true
  address: 0.0.0.0:8686
