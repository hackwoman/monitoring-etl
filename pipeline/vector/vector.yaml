sources:
  app_logs:
    type: file
    include:
      - /var/log/app/*.log
    read_from: beginning
    fingerprint:
      strategy: device_and_inode

transforms:
  # 1. 解析 JSON 日志
  parse_json:
    type: remap
    inputs:
      - app_logs
    source: |
      . = parse_json!(.message)
      .source = "file"

  # 2. 提取实体信息，准备 CMDB 心跳
  extract_entity:
    type: remap
    inputs:
      - parse_json
    source: |
      if exists(.service_name) {
        .cmdb_name = string!(.service_name)
        .cmdb_type = "Service"
      } else if exists(.host_name) {
        .cmdb_name = string!(.host_name)
        .cmdb_type = "Host"
      } else {
        abort
      }
      .cmdb_labels = object(.labels) ?? {}

sinks:
  # 写入 ClickHouse（主数据流）
  clickhouse_logs:
    type: clickhouse
    inputs:
      - parse_json
    endpoint: http://clickhouse:8123
    database: logs
    table: log_entries
    skip_unknown_fields: true
    buffer:
      type: memory
      max_events: 10000

  # CMDB 心跳（自动发现实体）
  cmdb_heartbeat:
    type: http
    inputs:
      - extract_entity
    uri: http://cmdb-api:8000/api/v1/cmdb/heartbeat
    method: post
    encoding:
      codec: json
    framing:
      method: newline_delimited
    request:
      timeout_secs: 5
      retry_max_duration_secs: 10
    buffer:
      type: memory
      max_events: 1000

api:
  enabled: true
  address: 0.0.0.0:8686
