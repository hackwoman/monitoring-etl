sources:
  app_logs:
    type: file
    include:
      - /var/log/app/*.log
    read_from: beginning
    fingerprint:
      strategy: device_and_inode

transforms:
  # 1. 解析 JSON 日志
  parse_json:
    type: remap
    inputs:
      - app_logs
    source: |
      . = parse_json!(.message)
      .source = "file"

  # 2. 提取实体信息，准备 CMDB 心跳
  extract_entity:
    type: remap
    inputs:
      - parse_json
    source: |
      .cmdb_name = .service_name ?? .host_name ?? "unknown"
      .cmdb_type = if .service_name != null { "Service" } else { "Host" }
      .cmdb_labels = .labels ?? {}

  # 3. 按实体名分组去重，减少 CMDB API 调用
  heartbeat_dedupe:
    type: reduce
    inputs:
      - extract_entity
    group_by:
      - cmdb_name
    merge_strategies:
      cmdb_name: discard
      cmdb_type: discard
      cmdb_labels: flat_unique
    starts_when: true
    max_events: 1

sinks:
  # 写入 ClickHouse（主数据流）
  clickhouse_logs:
    type: clickhouse
    inputs:
      - parse_json
    endpoint: http://clickhouse:8123
    database: logs
    table: log_entries
    skip_unknown_fields: true
    buffer:
      type: memory
      max_events: 10000

  # CMDB 心跳（自动发现实体）
  # 每个去重后的实体 group 发一次 POST
  cmdb_heartbeat:
    type: http
    inputs:
      - heartbeat_dedupe
    uri: http://cmdb-api:8000/api/v1/cmdb/heartbeat
    method: post
    encoding:
      codec: json
    framing:
      method: newline_delimited
    request:
      timeout_secs: 5
      retry_max_duration_secs: 10
    buffer:
      type: memory
      max_events: 100

api:
  enabled: true
  address: 0.0.0.0:8686
