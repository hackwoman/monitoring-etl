# Vector ETL Pipeline Configuration
# 接收 OTel 数据 → 解析 → 关联 CMDB → 写入 ClickHouse

# ---- Sources ----
[sources.otlp]
type = "opentelemetry"
grpc.address = "0.0.0.0:4317"
http.address = "0.0.0.0:4318"

# ---- Transforms ----

# 1. 从 OTel LogData 提取标准字段
[transforms.parse_otel]
type = "remap"
inputs = ["otlp.logs"]
source = '''
  # OTel log 标准字段提取
  .timestamp = .timestamp ?? now()
  .level = downcase(.severity_text ?? .attributes?.["log.level"] ?? .attributes?.["level"] ?? "info")
  .message = .body ?? .attributes?.["message"] ?? ""
  .service_name = .attributes?.["service_name"] ?? .resource?.["service.name"] ?? "unknown"
  .host_name = .attributes?.["host_name"] ?? .resource?.["host.name"] ?? "unknown"
  .trace_id = .attributes?.["trace_id"] ?? .trace_id ?? ""
  .span_id = .attributes?.["span_id"] ?? .span_id ?? ""
  .source = "otel"
  
  # 提取 endpoint
  .endpoint = .attributes?.["endpoint"] ?? ""
  .http_status = .attributes?.["http_status"] ?? 0
  
  # 提取 labels
  if .attributes?.["labels"] {
    .labels = .attributes["labels"]
  }
  
  # 提取 metrics 字段（核心指标）
  if .attributes?.["metrics"] {
    .metrics_json = encode_json(.attributes["metrics"])
  }
'''

# 2. 关联 CMDB 实体信息（自动创建实体）
[transforms.enrich_cmdb]
type = "http"
inputs = ["parse_otel"]
uri = "http://cmdb-api:8000/api/v1/cmdb/heartbeat"
method = "POST"
request.body = '''
  {"name": {{ .service_name | json }}, "type_name": "Service", "labels": {"host": {{ .host_name | json }}, "env": "production"}}
'''
response.status = "2xx"

# 3. 时效分类
[transforms.timeliness]
type = "remap"
inputs = ["enrich_cmdb"]
source = '''
  event_ts = to_timestamp(.timestamp)
  arrival_ts = now()
  delay_secs = to_int(arrival_ts - event_ts)
  
  if delay_secs < 30 {
    .timeliness = "hot"
  } else if delay_secs < 300 {
    .timeliness = "warm"
  } else if delay_secs < 3600 {
    .timeliness = "cool"
  } else {
    .timeliness = "cold"
  }
  .delay_seconds = delay_secs
'''

# ---- Sinks ----

# ClickHouse - 所有日志
[sinks.clickhouse_logs]
type = "clickhouse"
inputs = ["timeliness"]
endpoint = "http://clickhouse:8123"
database = "logs"
table = "log_entries"
skip_unknown_fields = true

[sinks.clickhouse_logs.buffer]
type = "disk"
max_size = 53687091200  # 50GB
when_full = "block"

# ---- API (Vector 内置监控) ----
[api]
enabled = true
address = "0.0.0.0:8686"
