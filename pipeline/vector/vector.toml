# Vector ETL Pipeline Configuration
# 直接读取模拟器日志文件 → 解析 → 关联 CMDB → 写入 ClickHouse

# ---- Sources ----

[sources.app_logs]
type = "file"
include = ["/var/log/app/*.log"]
read_from = "beginning"
fingerprint.strategy = "device_and_inode"

# ---- Transforms ----

# 1. 解析 JSON 日志
[transforms.parse_json]
type = "remap"
inputs = ["app_logs"]
source = '''
  parsed = parse_json(.message) ?? null
  if is_object(parsed) {
    .timestamp = parsed.timestamp ?? now()
    .level = downcase(parsed.level ?? "info")
    .message = parsed.message ?? ""
    .service_name = parsed.service_name ?? "unknown"
    .host_name = parsed.host_name ?? "unknown"
    .trace_id = parsed.trace_id ?? ""
    .span_id = parsed.span_id ?? ""
    .endpoint = parsed.endpoint ?? ""
    .http_status = to_int(parsed.http_status ?? 0)
    .labels = parsed.labels ?? {}
    
    # metrics 字段保持为 JSON 字符串
    if parsed.metrics {
      .metrics_json = encode_json(parsed.metrics)
    }
    
    .source = "file"
  }
'''

# 2. CMDB 心跳（自动创建实体）
[transforms.cmdb_heartbeat]
type = "http"
inputs = ["parse_json"]
uri = "http://cmdb-api:8000/api/v1/cmdb/heartbeat"
method = "POST"
request.body = '''
  {"name": {{ .service_name | json }}, "type_name": "Service", "labels": {"host": {{ .host_name | json }}, "env": "production"}}
'''
response.status = "2xx"

# 3. 时效分类
[transforms.timeliness]
type = "remap"
inputs = ["cmdb_heartbeat"]
source = '''
  .timeliness = "hot"
  .delay_seconds = 0
'''

# ---- Sinks ----

# ClickHouse - 所有日志
[sinks.clickhouse_logs]
type = "clickhouse"
inputs = ["timeliness"]
endpoint = "http://clickhouse:8123"
database = "logs"
table = "log_entries"
skip_unknown_fields = true

[sinks.clickhouse_logs.buffer]
type = "disk"
max_size = 53687091200  # 50GB
when_full = "block"

# ---- API (Vector 内置监控) ----
[api]
enabled = true
address = "0.0.0.0:8686"
