services:
  # ---- Core Storage ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./storage/postgres:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    volumes:
      - chdata:/var/lib/clickhouse
      - ./storage/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Data Pipeline ----
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    volumes:
      - ./pipeline/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - app-logs:/var/log/app:ro
      - otel-storage:/var/lib/otelcol
    ports:
      - "4317:4317"    # OTLP gRPC (for traces)
      - "4318:4319"    # OTLP HTTP (avoid conflict with Vector)
    depends_on:
      vector:
        condition: service_started

  vector:
    image: timberio/vector:0.42.0-alpine
    volumes:
      - ./pipeline/vector/vector.toml:/etc/vector/vector.toml:ro
    ports:
      - "4317:4318"    # Vector OTLP gRPC (forwarded)
      - "4318:4318"    # Vector OTLP HTTP
      - "8686:8686"    # Vector API (metrics)
    depends_on:
      clickhouse:
        condition: service_healthy
      cmdb-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8686/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Backend Services ----
  cmdb-api:
    build:
      context: ./services/cmdb-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cmdb
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      CMDB_DATABASE: cmdb
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  log-api:
    build:
      context: ./services/log-api
      dockerfile: Dockerfile
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DATABASE: logs
    ports:
      - "8002:8000"
    depends_on:
      clickhouse:
        condition: service_healthy

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    environment:
      CMDB_API_URL: http://cmdb-api:8000
      LOG_API_URL: http://log-api:8000
    ports:
      - "8000:8000"
    depends_on:
      - cmdb-api
      - log-api

  # ---- Frontend ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  pgdata:
  chdata:
  app-logs:
  otel-storage:
