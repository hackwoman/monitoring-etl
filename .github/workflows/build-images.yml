name: Build and Push Base Images
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com
          username: hackwoman1964
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Pull and push all base images
        run: |
          # Core database images (already on Aliyun, re-push to keep in sync)
          docker pull postgres:16-alpine
          docker pull redis:7-alpine
          docker pull clickhouse/clickhouse-server:24.8

          # Python runtime for API services
          docker pull python:3.12-slim

          # Node + Nginx for frontend build
          docker pull node:20-alpine
          docker pull nginx:alpine

          # Vector for metrics collection
          docker pull timberio/vector:0.42.0-alpine

          # Push all to Aliyun ACR
          docker push crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com/monitoring-etl/postgres:16-alpine
          docker push crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com/monitoring-etl/redis:7-alpine
          docker push crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com/monitoring-etl/clickhouse:24.8
          docker push crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com/monitoring-etl/python:3.12-slim
          docker push crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com/monitoring-etl/node:20-alpine
          docker push crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com/monitoring-etl/nginx:alpine
          docker push crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com/monitoring-etl/vector:0.42.0-alpine
