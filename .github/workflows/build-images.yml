name: Build and Push Base Images
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${ github.actor }
          password: ${ secrets.GITHUB_TOKEN }

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com
          username: hackwoman1964
          password: ${ secrets.ALIYUN_REGISTRY_PASSWORD }

      - name: Pull from Docker Hub
        run: |
          docker pull postgres:16-alpine
          docker pull redis:7-alpine
          docker pull clickhouse/clickhouse-server:24.8

      - name: Tag and push to ghcr.io
        run: |
          docker tag postgres:16-alpine ghcr.io/hackwoman/monitoring-etl/postgres:16-alpine
          docker tag redis:7-alpine ghcr.io/hackwoman/monitoring-etl/redis:7-alpine
          docker tag clickhouse/clickhouse-server:24.8 ghcr.io/hackwoman/monitoring-etl/clickhouse:24.8
          docker push ghcr.io/hackwoman/monitoring-etl/postgres:16-alpine
          docker push ghcr.io/hackwoman/monitoring-etl/redis:7-alpine
          docker push ghcr.io/hackwoman/monitoring-etl/clickhouse:24.8

      - name: Tag and push to Aliyun ACR
        run: |
          docker tag postgres:16-alpine crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com/monitoring-etl/postgres:16-alpine
          docker tag redis:7-alpine crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com/monitoring-etl/redis:7-alpine
          docker tag clickhouse/clickhouse-server:24.8 crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com/monitoring-etl/clickhouse:24.8
          docker push crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com/monitoring-etl/postgres:16-alpine
          docker push crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com/monitoring-etl/redis:7-alpine
          docker push crpi-fh2g4nclc643g3kg.cn-wulanchabu.personal.cr.aliyuncs.com/monitoring-etl/clickhouse:24.8
