name: Build and Push Base Images
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Pull and push images
        run: |
          docker pull postgres:16-alpine
          docker pull redis:7-alpine
          docker pull clickhouse/clickhouse-server:24.8

          # tag for ghcr.io
          docker tag postgres:16-alpine ghcr.io/hackwoman/monitoring-etl/postgres:16-alpine
          docker tag redis:7-alpine ghcr.io/hackwoman/monitoring-etl/redis:7-alpine
          docker tag clickhouse/clickhouse-server:24.8 ghcr.io/hackwoman/monitoring-etl/clickhouse:24.8

          # tag for Aliyun ACR (cn-hangzhou, namespace: monitoring-etl)
          docker tag postgres:16-alpine registry.cn-hangzhou.aliyuncs.com/monitoring-etl/postgres:16-alpine
          docker tag redis:7-alpine registry.cn-hangzhou.aliyuncs.com/monitoring-etl/redis:7-alpine
          docker tag clickhouse/clickhouse-server:24.8 registry.cn-hangzhou.aliyuncs.com/monitoring-etl/clickhouse:24.8

          # push to both
          docker push ghcr.io/hackwoman/monitoring-etl/postgres:16-alpine
          docker push ghcr.io/hackwoman/monitoring-etl/redis:7-alpine
          docker push ghcr.io/hackwoman/monitoring-etl/clickhouse:24.8
          docker push registry.cn-hangzhou.aliyuncs.com/monitoring-etl/postgres:16-alpine
          docker push registry.cn-hangzhou.aliyuncs.com/monitoring-etl/redis:7-alpine
          docker push registry.cn-hangzhou.aliyuncs.com/monitoring-etl/clickhouse:24.8
